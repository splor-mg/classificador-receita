# Catálogo de abreviações léxicas para nomenclatura de receitas (AliasLexico).
# CSV usa vírgula (padrão); células com vírgula no texto são citadas (RFC 4180). Coluna ``termo_nome`` mapeia ao campo ``termo`` no model.
fields:
  - name: termo_nome
    type: string
    title: Termo (forma completa)
    constraints:
      required: true
  - name: alias_lexico_ref
    type: integer
    title: Referência numérica estável do termo
    constraints:
      required: false
  - name: abreviacao
    type: string
    title: Abreviação sugerida
    constraints:
      required: true
  - name: data_registro_inicio
    type: datetime
    title: Início do registro (transaction time)
    constraints:
      required: true
  - name: data_registro_fim
    type: datetime
    title: Fim do registro (sentinela 9999-12-31 = ativo)
    constraints:
      required: true
