fields:
  - name: nivel_id
    type: string
    title: Identificador Único do Nível Hierárquico
    description: |
      Identificador único do nível hierárquico.
    gsim: ClassificationLevel.identifier
    constraints:
      required: true
  - name: nivel_ref
    type: integer
    title: Referência Numérica do Nível Hierárquico
    description: |
      Identificador numérico estável do nível hierárquico, usado na chave primária da linha (bitemporal).
      Mesmo valor para todas as linhas que pertencem ao mesmo nível conceitual (mesmo nivel_id).
    gsim: ClassificationLevel.reference
    constraints:
      required: true
  - name: classificacao_id
    type: string
    title: Identificador da Classificação
    description: |
      Referência à classificação estatística à qual este nível pertence.
    gsim: ClassificationLevel.belongsToStatisticalClassification
    constraints:
      required: true
  - name: nivel_numero
    type: integer
    title: Número do Nível Hierárquico
    description: |
      Número sequencial do nível na hierarquia, começando em 1 para o nível mais agregado.
    gsim: ClassificationLevel.levelNumber
    constraints:
      required: true
      minimum: 1
      maximum: 9
  - name: nivel_nome
    type: string
    title: Nome do Nível
    description: |
      Nome do nível hierárquico. Ex: "Categoria Econômica", "Origem", "Espécie", etc.
    gsim: ClassificationLevel.levelName
    constraints:
      required: true
  - name: nivel_descricao
    type: string
    title: Descrição do Nível
    description: |
      Descrição detalhada do nível, seu propósito e conteúdo.
    gsim: ClassificationLevel.description
    constraints:
      required: false
  - name: estrutura_codigo
    type: string
    title: Estrutura do Código no Nível
    description: |
      Padrão de estrutura do código neste nível. Ex: "C", "C.O", "C.O.E", etc.
    gsim: ClassificationLevel.codeStructure
    constraints:
      required: false
  - name: numero_digitos
    type: integer
    title: Número de Dígitos no Nível
    description: |
      Quantidade de dígitos do código neste nível.
    gsim: ClassificationLevel.numberOfDigits
    constraints:
      required: true
      minimum: 1
      maximum: 9
  - name: tipo_codigo
    type: string
    title: Tipo de Código
    description: |
      Tipo do código no nível. Valores: "numérico", "alfabético", "alfanumérico".
    gsim: ClassificationLevel.codeType
    constraints:
      required: true
      enum: ["numérico", "alfabético", "alfanumérico"]
  - name: data_vigencia_inicio
    type: date
    title: Data de Início da Vigência
    description: |
      Data de início da vigência do nível no domínio orçamentário.
    gsim: ClassificationLevel.validFrom
    constraints:
      required: true
  - name: data_vigencia_fim
    type: date
    title: Data do Fim da Vigência
    description: |
      Data de fim da vigência do nível. Valor sentinela 9999-12-31 indica vigência ativa no momento corrente e futuro.
    gsim: ClassificationLevel.validTo
    constraints:
      required: true
  - name: data_registro_inicio
    type: datetime
    title: Data de Início do Registro
    description: |
      Data e hora em que o sistema registrou esta informação.
    gsim: ClassificationLevel.transactionTimeStart
    constraints:
      required: true
  - name: data_registro_fim
    type: datetime
    title: Data do Fim do Registro
    description: |
      Data e hora em que esta informação deixou de ser considerada verdadeira pelo sistema. Valor sentinela 9999-12-31 00:00:00 indica registro ativo no momento corrente e futuro.
    gsim: ClassificationLevel.transactionTimeEnd
    constraints:
      required: true
primaryKey:
  - nivel_id
  - data_vigencia_inicio
  - data_registro_inicio
uniqueConstraints:
  # Garante que, dentro de uma mesma classificação, não existam dois níveis com o mesmo
  # nivel_numero abrindo na mesma data de registro (janela de transação). Ou seja: cada
  # classificação tem no máximo um "nível 1", um "nível 2", etc., por data_registro_inicio.
  # Refletido no model Django como UniqueConstraint unq_nivel_numero_classif.
  - [classificacao_id, nivel_numero, data_registro_inicio]
foreignKeys:
  - fields:
      - classificacao_id
    reference:
      resource: classificacao
      fields:
        - classificacao_id
missingValues: ["", "NA", "-"]
custom:
  qualityDimensions:
    rulesRef: quality/quality_rules.yaml
    ruleSets:
      - temporal_consistency_bitemporal
