fields:
  - name: Identificador da Série
    type: string
    target: serie_id
    title: Identificador Único da Série de Classificações
    description: |
      'Identificador único da entidade série de classificações (chave semântica).'
    gsim: ClassificationSeries.identifier
    constraints:
      required: true
  - name: Referência da Série
    type: integer
    target: serie_ref
    title: Referência Numérica da Série
    description: |
      'Identificador numérico estável da série de classificações, usado na chave primária da linha (bitemporal).'
      'Mesmo valor para todas as linhas que pertencem à mesma entidade (mesmo serie_id).'
    gsim: ClassificationSeries.reference
    constraints:
      required: true
  - name: Nome da Série
    type: string
    target: serie_nome
    title: Nome da Série de Classificações
    description: |
      'Nome oficial da série de classificações.'
    gsim: ClassificationSeries.name
    constraints:
      required: true
  - name: Descrição
    type: string
    target: descricao
    title: Descrição da Série
    description: |
      'Descrição detalhada da série de classificações e seu propósito.'
    gsim: ClassificationSeries.description
    constraints:
      required: false
  - name: Órgão Responsável
    type: string
    target: orgao_responsavel
    title: Órgão Responsável pela Série
    description: |
      'Órgão ou entidade responsável pela manutenção e gerenciamento da série de classificações.'
    gsim: ClassificationSeries.maintainingAgency
    constraints:
      required: false
  - name: Data Início Vigência
    type: date
    target: data_vigencia_inicio
    title: Data de Início da Vigência
    description: |
      'Data de início da vigência da série de classificações no domínio orçamentário.'
    gsim: ClassificationSeries.validFrom
    constraints:
      required: true
  - name: Data Fim Vigência
    type: date
    target: data_vigencia_fim
    title: Data de Fim da Vigência
    description: |
      'Data de fim da vigência da série de classificações. Valor sentinela 9999-12-31 indica vigência ativa no momento corrente e futuro.'
    gsim: ClassificationSeries.validTo
    constraints:
      required: true
  - name: Data Registro Início
    type: date
    target: data_registro_inicio
    title: Data de Registro Início
    description: |
      'Data em que o sistema registrou esta informação.'
    gsim: ClassificationSeries.transactionTimeStart
    constraints:
      required: true
  - name: Data Registro Fim
    type: date
    target: data_registro_fim
    title: Data de Registro Fim
    description: |
      'Data em que esta informação deixou de ser considerada verdadeira pelo sistema. Valor sentinela 9999-12-31 indica registro ativo no momento corrente e futuro.'
    gsim: ClassificationSeries.transactionTimeEnd
    constraints:
      required: true
primaryKey:
  - Referência da Série
  - Data Início Vigência
  - Data Registro Início
missingValues: ["", "NA", "-"]
