fields:
  - name: item_id
    type: string
    title: Identificador Único do Item de Classificação
    description: |
      Identificador único do item de classificação. Pode ser o código completo de 13 dígitos ou um ID substituto.
    gsim: ClassificationItem.identifier
    constraints:
      required: true
  - name: codigo_completo
    type: string
    title: Código Completo do Item
    description: |
      Código completo de 13 dígitos do item de classificação formatado. Formato: C.0.E.D.DD.D.T.II.SSS conforme estrutura do Classificador de Receita MG. Exemplo: "1.0.1.1.01.1.1.01.001".
    gsim: ClassificationItem.code
    constraints:
      required: true
      pattern: "^[0-9]\\.[0-9]\\.[0-9]\\.[0-9]\\.[0-9]{2}\\.[0-9]\\.[0-9]\\.[0-9]{2}\\.[0-9]{3}$"
  - name: codigo_numerico
    type: integer
    title: Código Numérico (13 dígitos)
    description: |
      Código numérico de 13 dígitos sem formatação (sem pontos). Equivalente ao campo "Classificação Receita - Código" do schema receita.yaml.
    gsim: ClassificationItem.code
    constraints:
      required: true
      minimum: 1000000000000
      maximum: 9999999999999
  - name: nivel_id
    type: string
    title: Identificador do Nível Hierárquico
    description: |
      Referência ao nível hierárquico ao qual este item pertence.
    gsim: ClassificationItem.belongsToLevel
    constraints:
      required: true
  - name: parent_item_id
    type: string
    title: Identificador do Item Pai
    description: |
      Referência ao item de classificação do nível imediatamente superior na hierarquia. NULL para itens do nível 1 (raiz).
    gsim: ClassificationItem.parentItem
    constraints:
      required: false
  - name: nome_oficial
    type: string
    title: Nome Oficial do Item
    description: |
      Nome oficial do item de classificação.
    gsim: ClassificationItem.officialName
    constraints:
      required: true
  - name: descricao
    type: string
    title: Descrição do Item
    description: |
      Descrição detalhada do item de classificação.
    gsim: ClassificationItem.description
    constraints:
      required: false
  - name: item_gerado
    type: boolean
    title: Item Gerado Automaticamente
    description: |
      Indica se o item foi gerado automaticamente para completar o nível. Valores: true (gerado) ou false (definido manualmente).
    gsim: ClassificationItem.generated
    constraints:
      required: true
  - name: valido_atualmente
    type: boolean
    title: Item Válido Atualmente
    description: |
      Indica se o item está atualmente válido na classificação.
    gsim: ClassificationItem.currentlyValid
    constraints:
      required: true
  - name: data_vigencia_inicio
    type: date
    title: Data de Início da Vigência
    description: |
      Data de início da vigência do item no domínio orçamentário.
    gsim: ClassificationItem.validFrom
    constraints:
      required: true
  - name: data_vigencia_fim
    type: date
    title: Data de Fim da Vigência
    description: |
      Data de fim da vigência do item. Valor sentinela 9999-12-31 indica vigência ativa no momento corrente e futuro.
    gsim: ClassificationItem.validTo
    constraints:
      required: true
  - name: data_registro_inicio
    type: datetime
    title: Data/Hora de Registro Início
    description: |
      Data e hora em que o sistema registrou esta informação.
    gsim: ClassificationItem.transactionTimeStart
    constraints:
      required: true
  - name: data_registro_fim
    type: datetime
    title: Data/Hora de Registro Fim
    description: |
      Data em que esta informação deixou de ser considerada verdadeira pelo sistema. Valor sentinela 9999-12-31 indica registro ativo no momento corrente e futuro.
    gsim: ClassificationItem.transactionTimeEnd
    constraints:
      required: true
primaryKey:
  - item_id
  - data_registro_inicio
foreignKeys:
  - fields:
      - nivel_id
    reference:
      resource: nivel_hierarquico
      fields:
        - nivel_id
  - fields:
      - parent_item_id
    reference:
      resource: item_classificacao
      fields:
        - item_id
missingValues: ["", "NA", "-"]
custom:
  qualityDimensions:
    rulesRef: quality/quality-rules.yaml
    ruleSets:
      - temporal_consistency_bitemporal
