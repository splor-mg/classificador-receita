fields:
  - name: versao_id
    type: string
    title: Identificador Único da Versão
    description: |
      Identificador único da versão da classificação.
    gsim: ClassificationVersion.identifier
    constraints:
      required: true
  - name: classificacao_id
    type: string
    title: Identificador da Classificação
    description: |
      Referência à classificação estatística à qual esta versão pertence.
    gsim: ClassificationVersion.belongsToStatisticalClassification
    constraints:
      required: true
  - name: versao_numero
    type: string
    title: Número ou Identificador da Versão
    description: |
      Número ou identificador da versão. Ex: "2024", "v1.0", etc.
    gsim: ClassificationVersion.versionNumber
    constraints:
      required: true
  - name: versao_nome
    type: string
    title: Nome da Versão
    description: |
      Nome descritivo da versão.
    gsim: ClassificationVersion.name
    constraints:
      required: false
  - name: descricao
    type: string
    title: Descrição da Versão
    description: |
      Descrição das mudanças e características desta versão. Versões são reservadas para mudanças que alteram fronteiras conceituais entre categorias (divisões, fusões, realocações significativas).
    gsim: ClassificationVersion.description
    constraints:
      required: false
  - name: data_lancamento
    type: date
    title: Data de Lançamento da Versão
    description: |
      Data oficial de lançamento/publicação da versão.
    gsim: ClassificationVersion.releaseDate
    constraints:
      required: false
  - name: data_vigencia_inicio
    type: date
    title: Data de Início da Vigência
    description: |
      Data de início da vigência da versão no domínio orçamentário.
    gsim: ClassificationVersion.validFrom
    constraints:
      required: true
  - name: data_vigencia_fim
    type: date
    title: Data de Fim da Vigência
    description: |
      Data de fim da vigência da versão. Valor sentinela 9999-12-31 indica vigência ativa no momento corrente e futuro.
    gsim: ClassificationVersion.validTo
    constraints:
      required: true
  - name: data_registro_inicio
    type: datetime
    title: Data/Hora de Registro Início
    description: |
      Data e hora em que o sistema registrou esta informação.
    gsim: ClassificationVersion.transactionTimeStart
    constraints:
      required: true
  - name: data_registro_fim
    type: datetime
    title: Data/Hora de Registro Fim
    description: |
      Data em que esta informação deixou de ser considerada verdadeira pelo sistema. Valor sentinela 9999-12-31 indica registro ativo no momento corrente e futuro.
    gsim: ClassificationVersion.transactionTimeEnd
    constraints:
      required: true
primaryKey:
  - versao_id
  - data_registro_inicio
foreignKeys:
  - fields:
      - classificacao_id
    reference:
      resource: classificacao_receita
      fields:
        - classificacao_id
missingValues: ["", "NA", "-"]
custom:
  qualityDimensions:
    rulesRef: quality/quality_rules.yaml
    ruleSets:
      - temporal_consistency_bitemporal
