[project]
site_name = "Classificador de Natureza de Receita - MG"
site_url = "https://splor-mg.github.io/classificador-receita"
docs_dir = "docs"
site_dir = "site"
# Navegação explícita: sidebar com Apresentação, Projeto, ERD, ADRs e Referências
nav = [
  "index.md",
  "projeto.md",
  { "Diagrama ERD" = "erd/index.md" },
  { "ADRs" = [
    "adr/index.md",
    "adr/adr-001_bitemporalidade.md",
    "adr/adr-002_gsim.md",
    "adr/adr-003_chave-semantica.md",
    "adr/adr-004_governanca-banco.md"
  ] },
  { "Referências" = "referencias/index.md" }
]

[project.theme]
palette = [
  { scheme = "default", primary = "blue", accent = "blue", toggle = { icon = "material/brightness-7", name = "Switch to dark mode" } },
  { scheme = "slate", primary = "blue", accent = "blue", toggle = { icon = "material/brightness-4", name = "Switch to light mode" } }
]
font = { text = "Roboto", code = "Roboto Mono" }
favicon = "material/book-open-variant"