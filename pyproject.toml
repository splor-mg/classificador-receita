[project]
name = "classificador-receita"
version = "0.1.0"
description = "Sistema de Gestão do Classificador de Natureza de Receita do Estado de Minas Gerais"
authors = [
    {name = "SPLOR-MG", email = "aid@planejamento.mg.gov.br"}
]
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
    "frictionless>=5.18.0,<6.0.0",
    "taskipy>=1.12.0,<2.0.0",
    "zensical (>=0.0.15,<0.0.16)",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0,<9.0.0",
    "black>=24.0.0,<25.0.0",
    "ruff>=0.1.0,<0.2.0",
]

[tool.poetry]
package-mode = false

[tool.taskipy.tasks]
validar-schemas = "python scripts/validate_schemas.py"
gerar-erd = "python scripts/generate_erd.py"
build-docs = "zensical build --clean" # Gera a documentação estática com Zensical removendo antes qualquer build antigo (--clean garante atualização e evita arquivos obsoletos)
serve = "zensical serve" # Inicia o servidor de preview local para visualização da documentação em tempo real

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ['py311']

[tool.ruff]
line-length = 100
target-version = "py311"

